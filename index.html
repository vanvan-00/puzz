<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goods Sorting - Puzzle de Estoque</title>
    <!-- Tailwind CSS CDN + Fonts para estilo refinado -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN (para ambiente standalone) -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel para JSX no navegador -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <!-- Lucide-React via UMD (ícones leves e bonitos) -->
    <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.min.js"></script>
    <style>
        /* animação de "match" - fade e escala para os itens que sumiram */
        @keyframes matchPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; background-color: gold; }
            100% { transform: scale(0); opacity: 0; }
        }
        .match-animation {
            animation: matchPop 0.25s ease-out forwards;
        }
        /* destaque suave para prateleira selecionada como destino */
        .slot-highlight {
            box-shadow: 0 0 0 3px #fbbf24, 0 0 0 6px rgba(251,191,36,0.3);
            transition: all 0.1s ease;
        }
        /* item selecionado (o produto) */
        .item-selected {
            box-shadow: 0 0 0 2px #3b82f6, 0 0 0 4px rgba(59,130,246,0.5);
            transform: scale(1.02);
            background-color: #e0f2fe;
        }
        /* toque responsivo */
        button, .item-clickable {
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* simulando textura de madeira para prateleiras */
        .wood-bg {
            background: #b87c4f;
            background-image: repeating-linear-gradient(45deg, rgba(100, 60, 20, 0.15) 0px, rgba(100, 60, 20, 0.15) 2px, transparent 2px, transparent 8px);
            border-radius: 1rem;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.1);
        }
        .shelf-inner {
            background: #f9e7c2;
            background: linear-gradient(145deg, #f3e1b3, #e9ce9a);
            border-radius: 0.75rem;
            min-height: 110px;
        }
        body {
            touch-action: manipulation;
        }
    </style>
</head>
<body class="bg-amber-50 flex items-center justify-center min-h-screen p-4 font-sans">
    <div id="root" class="w-full max-w-md mx-auto"></div>

    <script type="text/babel">
        // ============================================================
        // JOGO GOODS SORTING - PUZZLE DE PRATELEIRAS (Match-3 + Movimentação)
        // Inspirado em mecânica casual: cada nicho contém até 3 itens.
        // Mover itens entre prateleiras para formar trios idênticos e pontuar.
        // ============================================================
        
        const { useState, useEffect, useCallback } = React;
        // lucide-react disponível via window.LucideReact (ícones)
        const { RefreshCw, Move, Trophy, XCircle } = window.LucideReact;
        
        // CONSTANTES DO JOGO
        const GRID_SIZE = 3;           // 3x3 prateleiras
        const MAX_ITEMS_PER_SLOT = 3;  // cada nicho comporta até 3 produtos
        // Tipos de produtos (ícones fofos e coloridos)
        const PRODUCT_TYPES = ['🍎', '🍊', '🍇', '🍒', '🍓'];
        const BASE_POINTS_PER_MATCH = 15; // pontos por trio removido
        
        // Helper: sortear produto aleatório
        const getRandomProduct = () => PRODUCT_TYPES[Math.floor(Math.random() * PRODUCT_TYPES.length)];
        
        // Gera uma prateleira (slot) com 3 itens aleatórios (início)
        const createFullSlot = () => {
            const slot = [];
            for (let i = 0; i < MAX_ITEMS_PER_SLOT; i++) {
                slot.push(getRandomProduct());
            }
            return slot;
        };
        
        // Cria tabuleiro inicial 3x3 totalmente preenchido (cada slot com 3 itens)
        const createInitialBoard = () => {
            const board = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                const row = [];
                for (let j = 0; j < GRID_SIZE; j++) {
                    row.push(createFullSlot());
                }
                board.push(row);
            }
            return board;
        };
        
        // ============================================================
        // LÓGICA DE DETECÇÃO DE TRIOS (MATCH-3)
        // Verifica cada nicho: se contém exatamente 3 itens e todos idênticos
        // Retorna array de coordenadas [linha, coluna] dos slots que formaram trio
        // ============================================================
        const findMatchingSlots = (board) => {
            const matches = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    const slot = board[i][j];
                    // condição: tem 3 itens e todos iguais
                    if (slot.length === MAX_ITEMS_PER_SLOT && slot.every(item => item === slot[0])) {
                        matches.push([i, j]);
                    }
                }
            }
            return matches;
        };
        
        // ============================================================
        // REMOÇÃO DE TRIOS E REPOSIÇÃO DE ITENS (GRAVIDADE ESTILO "NOVOS PRODUTOS")
        // Quando um trio some, novos itens são gerados no mesmo nicho até completar 3 novamente
        // Isso mantém o desafio e simula reposição de mercadoria.
        // Retorna o tabuleiro atualizado e a pontuação ganha nesta rodada de limpeza.
        // ============================================================
        const removeMatchesAndRefill = (board, currentScore) => {
            const matchCoords = findMatchingSlots(board);
            if (matchCoords.length === 0) {
                return { newBoard: board, pointsEarned: 0 };
            }
            
            // Clonagem profunda para manipular
            const newBoard = board.map(row => row.map(slot => [...slot]));
            let pointsGained = 0;
            
            // 1) Remover os itens dos slots vitoriosos (esvaziar completamente o nicho)
            for (const [row, col] of matchCoords) {
                if (newBoard[row][col].length === MAX_ITEMS_PER_SLOT) {
                    newBoard[row][col] = [];   // os três itens somem (animação depois no UI)
                    pointsGained += BASE_POINTS_PER_MATCH;
                }
            }
            
            // 2) Reposição (gerar novos itens até cada slot ter 3 produtos)
            // Mantém a dificuldade e a diversão: a prateleira nunca fica vazia por muito tempo.
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    const slot = newBoard[i][j];
                    while (slot.length < MAX_ITEMS_PER_SLOT) {
                        slot.push(getRandomProduct());
                    }
                }
            }
            
            return { newBoard, pointsEarned: pointsGained };
        };
        
        // ============================================================
        // RESOLVE CASCATAS: Aplica remoção+refill recursivamente até não existirem mais trios
        // Essencial para matches consecutivos (ex: novos itens podem formar novos trios)
        // Retorna { boardFinal, totalPointsAdded }
        // ============================================================
        const resolveAllMatchesAndRefillChain = (initialBoard, initialScore) => {
            let currentBoard = initialBoard.map(row => row.map(slot => [...slot]));
            let accumulatedPoints = 0;
            let maxLoop = 50; // segurança contra loops infinitos
            let changed = true;
            
            while (changed && maxLoop-- > 0) {
                const { newBoard, pointsEarned } = removeMatchesAndRefill(currentBoard, 0);
                if (pointsEarned === 0) {
                    changed = false;
                    break;
                }
                accumulatedPoints += pointsEarned;
                currentBoard = newBoard;
            }
            return { boardFinal: currentBoard, totalPointsAdded: accumulatedPoints };
        };
        
        // Componente principal do jogo
        const GoodsSortingGame = () => {
            // Estado do tabuleiro 3x3, cada célula = array de produtos (máx 3)
            const [board, setBoard] = useState(() => createInitialBoard());
            const [score, setScore] = useState(0);
            const [selectedItem, setSelectedItem] = useState(null); // { row, col, itemIndex, productValue }
            const [message, setMessage] = useState("");
            const [matchAnimations, setMatchAnimations] = useState({}); // controle de animação nos slots { "row-col": true }
            
            // Limpar mensagem após tempo
            useEffect(() => {
                if (message) {
                    const timer = setTimeout(() => setMessage(""), 1500);
                    return () => clearTimeout(timer);
                }
            }, [message]);
            
            // Aplica animação de match nos slots removidos (efeito visual)
            const triggerMatchAnimation = (slotsCoordinates) => {
                const animMap = {};
                slotsCoordinates.forEach(([r,c]) => {
                    animMap[`${r}-${c}`] = true;
                });
                setMatchAnimations(animMap);
                // Remove a classe de animação após 300ms
                setTimeout(() => setMatchAnimations({}), 350);
            };
            
            // Função central: processa movimento, verifica matches, refill e cascata
            const performMoveAndResolve = useCallback((sourceRow, sourceCol, sourceItemIdx, targetRow, targetCol) => {
                // 1. Validação inicial: destino não pode ser o mesmo slot?
                if (sourceRow === targetRow && sourceCol === targetCol) {
                    setMessage("✋ Mova para uma prateleira diferente!");
                    setSelectedItem(null);
                    return false;
                }
                
                // Cópia atual do board
                let currentBoard = board.map(row => row.map(slot => [...slot]));
                const sourceSlot = currentBoard[sourceRow][sourceCol];
                const targetSlot = currentBoard[targetRow][targetCol];
                
                // Valida se índice do item é válido e se destino tem espaço (<3)
                if (sourceItemIdx >= sourceSlot.length) {
                    setMessage("⚠️ Item não encontrado!");
                    setSelectedItem(null);
                    return false;
                }
                if (targetSlot.length >= MAX_ITEMS_PER_SLOT) {
                    setMessage(`📦 Prateleira cheia! (máx ${MAX_ITEMS_PER_SLOT} itens)`);
                    setSelectedItem(null);
                    return false;
                }
                
                // O item específico que será movido
                const itemToMove = sourceSlot[sourceItemIdx];
                // Remove o item da origem (splice)
                sourceSlot.splice(sourceItemIdx, 1);
                // Adiciona no destino
                targetSlot.push(itemToMove);
                
                // Atualiza o board temporariamente para verificar matches
                // Agora precisamos aplicar resolução de matches + refill (cascata)
                const { boardFinal, totalPointsAdded } = resolveAllMatchesAndRefillChain(currentBoard, 0);
                
                // Capturar slots que tiveram match para animação (comparação entre board anterior e final)
                // Para simplificar e dar feedback legal, localizamos os slots que originalmente tinham trios e foram alterados.
                // Porém resolveAllMatches já aplica tudo. Vamos detectar trios que foram resolvidos comparando antes/depois.
                // Melhor: após resolução, exibimos mensagem genérica se pontos >0
                if (totalPointsAdded > 0) {
                    setMessage(`🎉 TRIO! +${totalPointsAdded} pontos! 🎉`);
                    // Para animação genérica: podemos destacar todos os slots onde houve remoção não trivial
                    // Buscar diferença sutil: mas animamos apenas com trigger geral.
                    // Podemos ver slots que tiveram match com findMatchingSlots no board pré-refill (pré-movimento+remoção)
                    const preMatchBoard = currentBoard;
                    const slotsWithMatchesBefore = findMatchingSlots(preMatchBoard);
                    if (slotsWithMatchesBefore.length > 0) {
                        triggerMatchAnimation(slotsWithMatchesBefore);
                    } else {
                        // efeito visual mesmo assim
                        triggerMatchAnimation([[targetRow, targetCol]]);
                    }
                } else {
                    setMessage("✅ Item movido!");
                }
                
                // Atualiza estado com o novo tabuleiro e soma pontos
                setBoard(boardFinal);
                setScore(prev => prev + totalPointsAdded);
                setSelectedItem(null); // limpa seleção após movimento
                return true;
            }, [board]);
            
            // Handler: clique em um item (selecionar produto)
            const handleItemClick = (row, col, itemIndex, product) => {
                // Se já existe seleção, não permite selecionar outro antes de mover ou cancelar? 
                // Regra UX: Se há item selecionado, o comportamento padrão deveria ser mover para o slot clicado (through container).
                // Mas aqui o clique no item SEMPRE age como seleção, exceto se quisermos que selecione novo.
                // Decisão: Toda vez que clicar num item, redefine a seleção para aquele item (cancelando movimento pendente)
                // Isso evita confusão. O usuário seleciona item e depois clica na prateleira destino (área geral do slot).
                setSelectedItem({
                    row, col, itemIndex, product
                });
                setMessage(`✨ Produto ${product} selecionado. Clique em outra prateleira para mover.`);
            };
            
            // Handler clique no slot (área da prateleira) quando houver item selecionado
            const handleSlotClickForMove = (targetRow, targetCol) => {
                if (!selectedItem) return;
                const { row: srcRow, col: srcCol, itemIndex } = selectedItem;
                // Executa a movimentação
                performMoveAndResolve(srcRow, srcCol, itemIndex, targetRow, targetCol);
            };
            
            // Reset do jogo completo
            const resetGame = () => {
                const freshBoard = createInitialBoard();
                // Verifica se já existem trios iniciais? Raramente mas podemos resolver logo para evitar partida com match instantâneo
                const { boardFinal, totalPointsAdded } = resolveAllMatchesAndRefillChain(freshBoard, 0);
                setBoard(boardFinal);
                setScore(0);
                setSelectedItem(null);
                setMessage("🔄 Novo jogo! Organize os produtos.");
                if (totalPointsAdded > 0) {
                    setMessage(`✨ Bônus inicial! +${totalPointsAdded} pontos.`);
                    setScore(totalPointsAdded);
                }
                // limpa animação
                setMatchAnimations({});
            };
            
            // Cancela a seleção atual
            const cancelSelection = () => {
                setSelectedItem(null);
                setMessage("❌ Seleção cancelada.");
            };
            
            // Renderização de um único slot (prateleira)
            const renderSlot = (row, col) => {
                const slotItems = board[row][col];
                const isSelectedSlot = selectedItem && selectedItem.row === row && selectedItem.col === col;
                const isAnimating = matchAnimations[`${row}-${col}`];
                
                return (
                    <div
                        key={`${row}-${col}`}
                        onClick={() => handleSlotClickForMove(row, col)}
                        className={`shelf-inner p-2 flex flex-col items-center justify-center transition-all duration-150 cursor-pointer relative ${isAnimating ? 'bg-yellow-200 scale-[1.02]' : ''}`}
                        style={{ minHeight: '110px' }}
                    >
                        {isSelectedSlot && (
                            <div className="absolute -top-2 -right-2 bg-blue-500 text-white rounded-full p-1 shadow-md z-10">
                                <Move size={14} />
                            </div>
                        )}
                        <div className="flex flex-wrap justify-center gap-2 items-center">
                            {slotItems.map((item, idx) => {
                                const isThisItemSelected = selectedItem && selectedItem.row === row && selectedItem.col === col && selectedItem.itemIndex === idx;
                                return (
                                    <div
                                        key={`${row}-${col}-${idx}`}
                                        onClick={(e) => {
                                            e.stopPropagation(); // IMPORTANTE: evitar trigger do slot ao clicar no item
                                            handleItemClick(row, col, idx, item);
                                        }}
                                        className={`item-clickable w-12 h-12 md:w-14 md:h-14 flex items-center justify-center text-3xl rounded-xl bg-white/80 shadow-md transition-all duration-100 ${isThisItemSelected ? 'item-selected ring-2 ring-blue-400 bg-blue-50' : 'hover:bg-amber-100'}`}
                                    >
                                        {item}
                                    </div>
                                );
                            })}
                            {/* indicador de espaço vazio visual (se houver menos de 3 itens, mas sempre terá 3 após resolução, exceto momentos transitórios) */}
                            {slotItems.length < MAX_ITEMS_PER_SLOT && Array(MAX_ITEMS_PER_SLOT - slotItems.length).fill(0).map((_, i) => (
                                <div key={`empty-${i}`} className="w-12 h-12 md:w-14 md:h-14 rounded-xl bg-amber-200/50 border border-dashed border-amber-400 flex items-center justify-center text-gray-400 text-xs">
                                    vago
                                </div>
                            ))}
                        </div>
                        {slotItems.length === MAX_ITEMS_PER_SLOT && slotItems.every(v => v === slotItems[0]) && (
                            <div className="absolute inset-0 pointer-events-none bg-gradient-to-tr from-yellow-300/40 to-transparent rounded-xl animate-pulse" />
                        )}
                    </div>
                );
            };
            
            // Cria grid 3x3
            const renderGrid = () => {
                const grid = [];
                for (let i = 0; i < GRID_SIZE; i++) {
                    const rowCells = [];
                    for (let j = 0; j < GRID_SIZE; j++) {
                        rowCells.push(
                            <div key={`cell-${i}-${j}`} className="aspect-square p-1.5">
                                {renderSlot(i, j)}
                            </div>
                        );
                    }
                    grid.push(
                        <div key={`row-${i}`} className="grid grid-cols-3 gap-2 mb-2">
                            {rowCells}
                        </div>
                    );
                }
                return grid;
            };
            
            // Barra superior com pontuação e botões
            return (
                <div className="bg-white/80 backdrop-blur-sm rounded-2xl shadow-2xl overflow-hidden border border-amber-200">
                    {/* Cabeçalho madeira */}
                    <div className="wood-bg px-4 py-3 flex justify-between items-center text-white">
                        <div className="flex items-center gap-2">
                            <Trophy size={24} fill="gold" stroke="gold" />
                            <span className="font-bold text-xl tracking-wide">SortMaster</span>
                        </div>
                        <div className="bg-amber-900/50 px-4 py-1 rounded-full text-amber-100 font-mono font-bold">
                            🏆 {score} pts
                        </div>
                    </div>
                    
                    {/* Área do jogo - Grid de prateleiras */}
                    <div className="p-4 bg-amber-100/40">
                        <div className="wood-bg p-3 rounded-2xl">
                            {renderGrid()}
                        </div>
                    </div>
                    
                    {/* Painel de informações e ações */}
                    <div className="p-4 bg-amber-50 border-t border-amber-200 space-y-3">
                        {message && (
                            <div className="text-center text-sm font-medium bg-amber-100 py-2 rounded-full text-amber-800 transition-all">
                                {message}
                            </div>
                        )}
                        
                        {selectedItem && (
                            <div className="flex items-center justify-between bg-blue-100 p-2 rounded-xl">
                                <div className="flex items-center gap-2">
                                    <span className="font-semibold">📦 Selecionado:</span>
                                    <span className="text-2xl">{selectedItem.product}</span>
                                    <span className="text-sm text-gray-600">da prateleira [{selectedItem.row+1},{selectedItem.col+1}]</span>
                                </div>
                                <button 
                                    onClick={cancelSelection}
                                    className="bg-red-400 hover:bg-red-500 text-white p-1.5 rounded-full transition-all"
                                >
                                    <XCircle size={20} />
                                </button>
                            </div>
                        )}
                        
                        <div className="flex gap-3">
                            <button
                                onClick={resetGame}
                                className="flex-1 bg-amber-700 hover:bg-amber-800 text-white font-semibold py-2 rounded-xl flex items-center justify-center gap-2 shadow transition"
                            >
                                <RefreshCw size={18} />
                                Novo Jogo
                            </button>
                            <button
                                onClick={cancelSelection}
                                className="flex-1 bg-gray-400 hover:bg-gray-500 text-white font-semibold py-2 rounded-xl flex items-center justify-center gap-2 shadow transition"
                                disabled={!selectedItem}
                                style={{ opacity: selectedItem ? 1 : 0.6 }}
                            >
                                <XCircle size={18} />
                                Cancelar
                            </button>
                        </div>
                        
                        <div className="text-xs text-center text-amber-700 bg-amber-100/70 p-2 rounded-lg">
                            <span className="font-bold">🎮 Como jogar:</span> Clique em um produto para selecionar, depois clique em outra prateleira com espaço livre (máx 3 itens). Junte 3 itens iguais no mesmo nicho para pontuar! ✨
                        </div>
                    </div>
                </div>
            );
        };
        
        // Renderização do app no root
        ReactDOM.createRoot(document.getElementById("root")).render(<GoodsSortingGame />);
    </script>
</body>
</html>
